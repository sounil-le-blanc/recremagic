<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin calendrier - Récré Magic</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --vert-caravane: #7CB69F;
            --rose-spectacle: #EC407A;
            --jaune-accent: #FFB300;
            --text-dark: #2C1810;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--rose-spectacle), var(--vert-caravane)); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, var(--vert-caravane), var(--rose-spectacle)); }

        body {
            font-family: 'Quicksand', sans-serif;
            background-image: url('images/fond-image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
            pointer-events: none;
        }

        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(235, 215, 185, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 2rem;
            border: 5px solid #7a5c3e;
            outline: 4px solid #5a3e2a;
            outline-offset: 4px;
            box-shadow: 0 0 0 8px #3e2a1a, 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
            width: 100%;
        }
        h1, h2 { color: #2C1810; text-align: center; }
        input, textarea, button, select {
            width: 100%;
            padding: 0.7rem;
            margin: 0.5rem 0;
            border-radius: 30px;
            border: 1.5px solid #c4a882;
            font-family: inherit;
            background: #fefefe;
        }
        button {
            background: #7CB69F;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { background: #5a8f78; }
        .event-item {
            background: rgba(255, 255, 255, 0.6);
            margin: 1rem 0;
            padding: 0.8rem;
            border-radius: 20px;
            border-left: 5px solid #7CB69F;
        }
        .delete-event {
            background: #D32F2F;
            width: auto;
            padding: 0.2rem 0.8rem;
            margin-top: 0.5rem;
        }
        .code-section {
            background: rgba(255, 255, 255, 0.5);
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 1px solid #c4a882;
        }
        .hidden { display: none; }
        .date-field { transition: background 0.3s; }
        .date-highlight { background-color: #FFEB3B !important; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; gap: 0; } }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>🔐 Administration du calendrier</h1>

    <div class="code-section" id="codeSection">
        <label>Code d'accès :</label>
        <input type="password" id="accessCode" placeholder="Code secret">
        <button id="verifyBtn">Vérifier</button>
        <p id="codeError" style="color:red; display:none;">Code incorrect</p>
    </div>

    <div id="adminPanel" class="hidden">
        <h2>➕ Ajouter un événement</h2>
        <form id="eventForm">
            <label>Date *</label>
            <input type="date" id="eventDate" class="date-field" required>

            <div class="form-row">
                <div class="form-group">
                    <label>Type</label>
                    <select id="eventType">
                        <option value="Spectacle">🎭 Spectacle</option>
                        <option value="Exposition">🖼️ Exposition</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Titre</label>
                    <select id="eventTitle" required>
                        <option value="">-- Sélectionnez --</option>
                    </select>
                </div>
            </div>

            <label>Lieu</label>
            <textarea id="eventLieu" rows="2" placeholder="Ville, salle..."></textarea>

            <button type="submit">💾 Enregistrer</button>
        </form>

        <hr>
        <h2>📋 Événements existants</h2>
        <div id="eventsList"></div>

        <button id="openCalendarBtn" style="background: #7CB69F;">📅 Ouvrir le calendrier public</button>
        <button id="openInscriptionBtn" style="background: #EC407A; margin-top: 0.8rem;">📝 Inscription</button>
    </div>
</div>

<script>
    const SECRET_CODE = "recremagic";
    const STORAGE_KEY = 'recremagic_calendar';

    const SPECTACLES = [
        "DU COUP ON VIENT CHEZ VOUS",
        "DU COUP on revient chez vous",
        "COMME SUR DES ROULETTES",
        "DÉLICIEUSEMENT MABOUL"
    ];
    const EXPOSITIONS = [
        "LA FÉERIE DES MARIONNETTES",
        "LES GÉANTS DU CARNAVAL"
    ];

    function updateTitleDropdown() {
        const type = document.getElementById('eventType').value;
        const titleSelect = document.getElementById('eventTitle');
        const titles = (type === 'Spectacle') ? SPECTACLES : EXPOSITIONS;
        titleSelect.innerHTML = '<option value="">-- Sélectionnez --</option>';
        titles.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            titleSelect.appendChild(opt);
        });
    }

    document.getElementById('verifyBtn').onclick = () => {
        if (document.getElementById('accessCode').value === SECRET_CODE) {
            document.getElementById('codeSection').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('hidden');
            loadEvents();
            updateTitleDropdown();
        } else {
            document.getElementById('codeError').style.display = 'block';
        }
    };

    document.getElementById('eventType').addEventListener('change', updateTitleDropdown);

    function getEvents() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return {};
        const data = JSON.parse(stored);
        for (let key in data) {
            if (!Array.isArray(data[key])) {
                const old = data[key];
                if (old.spectacle !== undefined || old.titre !== undefined) {
                    const type = old.type || 'Spectacle';
                    const titre = old.titre || old.spectacle || '';
                    const lieu = old.lieu || '';
                    data[key] = [{ type, titre, lieu }];
                } else {
                    data[key] = [];
                }
            }
        }
        return data;
    }

    function saveEvents(events) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    }

    function addEvent(dateKey, type, titre, lieu) {
        let events = getEvents();
        if (!events[dateKey]) events[dateKey] = [];
        events[dateKey].push({ type, titre, lieu });
        saveEvents(events);
        loadEvents();
    }

    function deleteEventFromDate(dateKey, index) {
        let events = getEvents();
        if (events[dateKey] && events[dateKey][index]) {
            events[dateKey].splice(index, 1);
            if (events[dateKey].length === 0) delete events[dateKey];
            saveEvents(events);
            loadEvents();
        }
    }

    function loadEvents() {
        const events = getEvents();
        const container = document.getElementById('eventsList');
        const sortedDates = Object.keys(events).sort();
        if (sortedDates.length === 0) {
            container.innerHTML = '<p>Aucun événement.</p>';
            return;
        }
        let html = '';
        for (let date of sortedDates) {
            const eventList = events[date];
            html += `<div style="margin-bottom: 1.5rem; border-bottom: 1px solid #ccc;"><strong>📅 ${date}</strong>`;
            eventList.forEach((ev, idx) => {
                const typeIcon = ev.type === 'Exposition' ? '🖼️' : '🎭';
                html += `
                    <div class="event-item">
                        <div>${typeIcon} <strong>${escapeHtml(ev.titre)}</strong><br>📍 ${escapeHtml(ev.lieu) || '—'}</div>
                        <button class="delete-event" data-date="${date}" data-index="${idx}">🗑 Supprimer</button>
                    </div>
                `;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.delete-event').forEach(btn => {
            btn.addEventListener('click', () => {
                const date = btn.getAttribute('data-date');
                const idx = parseInt(btn.getAttribute('data-index'));
                if (confirm(`Supprimer cet événement du ${date} ?`)) deleteEventFromDate(date, idx);
            });
        });
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

    const form = document.getElementById('eventForm');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const dateValue = document.getElementById('eventDate').value;
        if (!dateValue) return;
        document.getElementById('eventDate').classList.add('date-highlight');
        setTimeout(() => document.getElementById('eventDate').classList.remove('date-highlight'), 2000);
        const [year, month, day] = dateValue.split('-');
        const dateKey = `${year}-${parseInt(month)}-${parseInt(day)}`;
        const type = document.getElementById('eventType').value;
        const titre = document.getElementById('eventTitle').value;
        if (!titre) { alert("Veuillez sélectionner un titre"); return; }
        const lieu = document.getElementById('eventLieu').value.trim();
        addEvent(dateKey, type, titre, lieu);
        document.getElementById('eventLieu').value = '';
        alert(`✅ Événement ajouté au ${dateKey}`);
    });

    document.getElementById('openCalendarBtn').onclick = () => window.open('calendrier.html', '_blank');
    document.getElementById('openInscriptionBtn').onclick = () => window.open('inscription.html', '_blank');
</script>
</body>
</html>
