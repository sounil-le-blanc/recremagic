<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récré Magic - Familles & Fans</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            position: relative;
        }

        body {
            background-image: url('images/fond-image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #EC407A, #7CB69F); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #7CB69F, #EC407A); }

        /* ========== NAVBAR ========== */
        .navbar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 55px;
        }
        .navbar-container {
            width: 100%;
            height: 100%;
            padding: 0 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
        }
        .nav-left-group {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
            z-index: 2;
        }
        .logo-wrapper {
            text-decoration: none;
            transition: all 0.25s ease;
            line-height: 0;
        }
        .logo-wrapper img {
            height: 120px;
            transition: transform 0.25s;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.8));
            margin-top: 60px;
        }
        .logo-wrapper:hover img {
            transform: scale(1.08);
            filter: drop-shadow(0 6px 18px rgba(0,0,0,0.9));
        }
        .back-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.1rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }
        .back-arrow:hover {
            background: rgba(255,255,255,0.2);
            border-color: #FFB300;
            color: #FFB300;
            box-shadow: 0 0 12px rgba(255,179,0,0.3);
        }
        .nav-icons {
            display: flex;
            gap: 1.2rem;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: nowrap;
            z-index: 2;
        }
        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.1rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .nav-icon-img {
            height: 32px;
            width: auto;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
            transition: transform 0.2s;
        }
        .icon-wrapper:hover .nav-icon-img {
            transform: scale(1.15);
        }
        .icon-wrapper .icon-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.7);
            transition: color 0.2s;
            white-space: nowrap;
        }
        .icon-wrapper:hover .icon-label { color: #FFB300; }

        .desktop-view, .mobile-view, .instruction {
            position: relative;
            z-index: 2;
        }

        /* ========== DESKTOP VERSION ========== */
        .desktop-view { display: block; }

        .caravane-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
        }

        .caravane-container {
            position: relative;
            width: 90%;
            max-width: 1800px;
            margin: 0 auto;
        }

        .caravane-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
            transition: opacity 0.05s ease;
        }

        .hotspots-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .hotspot {
            cursor: pointer;
            pointer-events: all;
            fill: transparent;
        }

        .instruction {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            color: #2C1810;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            animation: pulse 2s ease-in-out infinite;
            z-index: 1000;
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }

        /* ========== MOBILE VERSION ========== */
        .mobile-view { display: none; }

        .mobile-caravane-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-x: scroll;
            overflow-y: hidden;
            background: rgba(0, 0, 0, 0.3);
            -webkit-overflow-scrolling: touch;
        }

        .mobile-caravane-container {
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 50vw;
        }

        .mobile-caravane-container::after {
            content: '';
            display: block;
            width: 80vw;
            height: 1px;
            flex-shrink: 0;
        }

        .mobile-caravane-image {
            height: 60vh;
            width: auto;
            display: block;
            border-radius: 10px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        @media (max-width: 968px) {
            .desktop-view { display: none; }
            .mobile-view { display: block; }
            .instruction { display: none; }
        }

        @media (max-width: 600px) {
            .navbar { height: 48px; }
            .navbar-container { padding: 0 0.8rem; }
            .nav-left-group { gap: 0.4rem; }
            .logo-wrapper img { height: 80px; margin-top: 30px; }
            .back-arrow { width: 32px; height: 32px; font-size: 1rem; }
            .nav-icon-img { height: 26px; }
            .icon-wrapper .icon-label { font-size: 0.5rem; }
            .nav-icons { gap: 0.7rem; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <div class="nav-left-group">
            <a href="index.html" class="logo-wrapper">
                <img src="images/logo.png" alt="Récré Magic">
            </a>
            <div class="back-arrow" onclick="history.back()" title="Retour">←</div>
        </div>

        <div class="nav-icons">
            <a href="boutique.html" class="icon-wrapper">
                <img src="images/icone-boutique.png" alt="Boutique" class="nav-icon-img">
                <span class="icon-label">Boutique</span>
            </a>
            <a href="Abonnement.html" class="icon-wrapper">
                <img src="images/icone-abonnement.png" alt="Abonnement" class="nav-icon-img">
                <span class="icon-label">Abonnement</span>
            </a>
        </div>
    </div>
</nav>

<!-- ========== DESKTOP VERSION ========== -->
<div class="desktop-view">
    <div class="instruction">✨ Survolez les personnages pour les découvrir !</div>

    <div class="caravane-wrapper">
        <div class="caravane-container">
            <img src="images/caravane-base.png"
                 alt="Caravane Récré Magic"
                 class="caravane-image"
                 id="caravaneImg">

            <svg class="hotspots-svg" viewBox="0 0 2000 660" preserveAspectRatio="xMidYMid meet">

                <a href="https://www.youtube.com/@recremagic"
                   target="_blank"
                   onmouseover="changeImage('caravane-toto.png')"
                   onmouseout="changeImage('caravane-base.png')">
                    <rect x="250" y="140" width="180" height="380" class="hotspot" />
                </a>

                <a href="spectacles.html"
                   onmouseover="changeImage('caravane-rideau.png')"
                   onmouseout="changeImage('caravane-base.png')">
                    <rect x="535" y="275" width="410" height="200" class="hotspot" />
                </a>

                <a href="nos-stars.html"
                   onmouseover="changeImage('caravane-flo.png')"
                   onmouseout="changeImage('caravane-base.png')">
                    <rect x="1000" y="180" width="200" height="400" class="hotspot" />
                </a>

                <a href="boutique.html"
                   onmouseover="changeImage('caravane-rideau-or.png')"
                   onmouseout="changeImage('caravane-base.png')">
                    <rect x="1240" y="140" width="190" height="400" class="hotspot" />
                </a>

                <a href="calendrier.html"
                   onmouseover="changeImage('caravane-calendrier.png')"
                   onmouseout="changeImage('caravane-base.png')">
                    <rect x="1610" y="210" width="120" height="100" class="hotspot" />
                </a>

                <a href="nos-stars.html"
                   onmouseover="changeImage('caravane-baptiste.png')"
                   onmouseout="changeImage('caravane-base.png')">
                    <rect x="1600" y="360" width="150" height="220" class="hotspot" />
                </a>

                <a href="nos-stars.html"
                   onmouseover="changeImage('caravane-gus.png')"
                   onmouseout="changeImage('caravane-base.png')">
                    <rect x="1800" y="260" width="200" height="420" class="hotspot" />
                </a>

                <a href="nos-stars.html"
                   onmouseover="changeImage('caravane-cookie.png')"
                   onmouseout="changeImage('caravane-base.png')">
                    <rect x="515" y="480" width="100" height="100" class="hotspot" />
                </a>

            </svg>
        </div>
    </div>
</div>

<!-- ========== MOBILE VERSION ========== -->
<div class="mobile-view">
    <div class="mobile-caravane-wrapper" id="mobileWrapper">
        <div class="mobile-caravane-container">
            <img src="images/caravane-base.png"
                 alt="Caravane Récré Magic"
                 class="mobile-caravane-image"
                 id="mobileCaravaneImg">
        </div>
    </div>
</div>

<script>
    function changeImage(imageName) {
        const img = document.getElementById('caravaneImg');
        if (img) img.src = 'images/' + imageName;
    }

    window.addEventListener('load', () => {
        const imagesToPreload = [
            'caravane-base.png', 'caravane-toto.png', 'caravane-rideau.png',
            'caravane-flo.png', 'caravane-rideau-or.png', 'caravane-calendrier.png',
            'caravane-baptiste.png', 'caravane-gus.png', 'caravane-cookie.png'
        ];
        imagesToPreload.forEach(src => { const img = new Image(); img.src = 'images/' + src; });
    });

    if (window.innerWidth <= 968) {
        const wrapper = document.getElementById('mobileWrapper');
        const img = document.getElementById('mobileCaravaneImg');

        if (wrapper && img) {
            const zones = [
                { name: 'toto', start: 12.5, end: 21.5, image: 'caravane-toto.png', link: 'https://www.youtube.com/@recremagic', external: true },
                { name: 'cookie', start: 23, end: 29, image: 'caravane-cookie.png', link: 'nos-stars.html', external: false },
                { name: 'rideau', start: 26.75, end: 47.25, image: 'caravane-rideau.png', link: 'spectacles.html', external: false },
                { name: 'flo', start: 50, end: 60, image: 'caravane-flo.png', link: 'nos-stars.html', external: false },
                { name: 'rideau-or', start: 62, end: 71.5, image: 'caravane-rideau-or.png', link: 'boutique.html', external: false },
                { name: 'calendrier', start: 78, end: 83, image: 'caravane-calendrier.png', link: 'calendrier.html', external: false },
                { name: 'baptiste', start: 84, end: 90, image: 'caravane-baptiste.png', link: 'nos-stars.html', external: false },
                { name: 'gus', start: 91, end: 100, image: 'caravane-gus.png', link: 'nos-stars.html', external: false }
            ];

            let currentZone = null;
            let currentZoneData = null;

            function checkZone() {
                const imgRect = img.getBoundingClientRect();
                const imgWidth = imgRect.width;
                const screenCenter = window.innerWidth / 2;
                const centerOnImage = screenCenter - imgRect.left;
                const centerPercent = (centerOnImage / imgWidth) * 100;
                let foundZone = null;
                for (let zone of zones) {
                    if (centerPercent >= zone.start && centerPercent <= zone.end) {
                        foundZone = zone;
                        break;
                    }
                }
                if (foundZone && foundZone.name !== currentZone) {
                    currentZone = foundZone.name;
                    currentZoneData = foundZone;
                    img.src = 'images/' + foundZone.image;
                } else if (!foundZone && currentZone !== null) {
                    currentZone = null;
                    currentZoneData = null;
                    img.src = 'images/caravane-base.png';
                }
            }

            img.addEventListener('click', () => {
                if (currentZoneData) {
                    if (currentZoneData.external) window.open(currentZoneData.link, '_blank');
                    else window.location.href = currentZoneData.link;
                }
            });

            let scrollTimeout;
            wrapper.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(checkZone, 50);
            });
            setTimeout(checkZone, 200);
        }
    }
</script>
</body>
</html>
