<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stages - Récré Magic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: 'Arial', 'Helvetica', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Bouton retour */
        .back-button {
            position: fixed;
            top: 2rem;
            left: 2rem;
            background: #2C1810;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.3s;
            z-index: 100;
        }

        .back-button:hover {
            background: #FFB300;
            color: #2C1810;
        }

        /* Conteneur principal */
        .coming-soon-container {
            text-align: center;
            padding: 2rem;
        }

        .coming-soon-title {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 0.3rem;
            color: #2C1810;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .coming-soon-sub {
            font-size: 1.2rem;
            color: #666;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .coming-soon-title {
                font-size: 2.5rem;
                letter-spacing: 0.2rem;
            }
            .back-button {
                top: 1rem;
                left: 1rem;
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Bouton retour vers pros.html -->
    <a href="pros.html" class="back-button">← Retour</a>

    <!-- Message principal -->
    <div class="coming-soon-container">
        <div class="coming-soon-title">COMING SOON</div>
        <div class="coming-soon-sub">Cette page est en cours de construction</div>
    </div>

</body>
</html>
