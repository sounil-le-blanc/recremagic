<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier - Récré Magic</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==================== */
        /* RESET & VARIABLES */
        /* ==================== */
        :root {
            --vert-caravane: #7CB69F;
            --rose-spectacle: #EC407A;
            --rouge-spectacle: #D32F2F;
            --jaune-accent: #FFB300;
            --creme-vintage: #FFF8E1;
            --text-dark: #2C1810;
            --text-light: #ffffff;
            --bg-light: #f9f9f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--creme-vintage);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 80px;
        }

        /* ==================== */
        /* SCROLLBAR PERSONNALISÉE */
        /* ==================== */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--rose-spectacle), var(--vert-caravane));
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--vert-caravane), var(--rose-spectacle));
        }

        /* ==================== */
        /* NAVBAR (identique aux autres pages) */
        /* ==================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(44, 24, 16, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        /* Groupe gauche : bouton retour + logo */
        .nav-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        /* Bouton retour (page précédente) */
        .back-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .back-wrapper span:first-child {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            transition: transform 0.2s, color 0.2s;
        }

        .back-wrapper .back-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.2s ease;
            color: white;
            white-space: nowrap;
        }

        .back-wrapper:hover span:first-child {
            transform: scale(1.05);
            color: var(--jaune-accent);
        }

        .back-wrapper:hover .back-label {
            opacity: 1;
            color: var(--jaune-accent);
        }

        /* Logo avec texte "Accueil" au survol */
        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .logo-wrapper img {
            height: 50px;
            transition: transform 0.2s;
        }

        .logo-wrapper .logo-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.2s ease;
            color: white;
            white-space: nowrap;
        }

        .logo-wrapper:hover img {
            transform: scale(1.05);
        }

        .logo-wrapper:hover .logo-label {
            opacity: 1;
            color: var(--jaune-accent);
        }

        .nav-icons {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .icon-wrapper span {
            font-size: 1.3rem;
            color: white;
            transition: transform 0.2s;
        }

        .icon-wrapper .icon-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.2s ease;
            color: white;
            white-space: nowrap;
        }

        .icon-wrapper:hover span {
            transform: scale(1.1);
            color: var(--jaune-accent);
        }

        .icon-wrapper:hover .icon-label {
            opacity: 1;
            color: var(--jaune-accent);
        }

        /* ==================== */
        /* PAGE HEADER */
        /* ==================== */
        .page-hero {
            background: linear-gradient(135deg, var(--rouge-spectacle), #c2185b);
            color: white;
            padding: 4rem 2rem;
            text-align: center;
            margin-top: 0;
        }

        .page-hero h1 {
            font-family: 'Fredoka', cursive;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .page-hero p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        /* ==================== */
        /* TABLEAU CALENDRIER */
        /* ==================== */
        .calendar-table-container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem 4rem;
            overflow-x: auto;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .calendar-table th {
            background: linear-gradient(135deg, var(--vert-caravane), var(--rose-spectacle));
            color: white;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .calendar-table td {
            padding: 0.8rem 1rem;
            border: 1px solid #e0e0e0;
            text-align: center;
        }

        .month-cell {
            background: var(--creme-vintage);
            font-weight: 700;
            color: var(--rouge-spectacle);
        }

        /* ==================== */
        /* RESPONSIVE */
        /* ==================== */
        @media (max-width: 768px) {
            body {
                padding-top: 70px;
            }
            
            .navbar-container {
                flex-direction: column;
                padding: 0.6rem 1.5rem;
            }
            
            .nav-left {
                gap: 1rem;
            }
            
            .nav-icons {
                gap: 1.5rem;
            }
            
            .logo-wrapper img {
                height: 45px;
            }
            
            .page-hero h1 {
                font-size: 2.5rem;
            }
            
            .calendar-table-container {
                padding: 0 1rem 2rem;
            }
            
            .calendar-table th,
            .calendar-table td {
                padding: 0.5rem;
                font-size: 0.9rem;
            }
            
            ::-webkit-scrollbar {
                width: 8px;
            }
        }

        @media (max-width: 480px) {
            .page-hero {
                padding: 2rem 1rem;
            }
            
            .page-hero h1 {
                font-size: 1.8rem;
            }
            
            .page-hero p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<!-- BARRE MARRON -->
<nav class="navbar">
    <div class="navbar-container">
        <div class="nav-left">
            <!-- Bouton retour (page précédente) -->
            <div class="back-wrapper" onclick="history.back()">
                <span>← Retour</span>
                <span class="back-label">Retour</span>
            </div>

            <!-- Logo avec texte "Accueil" au survol -->
            <a href="index.html" class="logo-wrapper">
                <img src="images/logo.png" alt="Récré Magic">
                <span class="logo-label">Accueil</span>
            </a>
        </div>

        <div class="nav-icons">
            <a href="calendrier.html" class="icon-wrapper" title="Calendrier">
                <span>📅</span>
                <span class="icon-label">Calendrier</span>
            </a>
            <a href="boutique.html" class="icon-wrapper" title="Boutique">
                <span>💰</span>
                <span class="icon-label">Boutique</span>
            </a>
            <a href="Abonnement.html" class="icon-wrapper" title="Abonnement">
                <span>🤝</span>
                <span class="icon-label">Abonnement</span>
            </a>
        </div>
    </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-hero">
    <h1>📅 Calendrier 2026</h1>
    <p>Planning des représentations</p>
</div>

<!-- TABLEAU CALENDRIER -->
<div class="calendar-table-container">
    <table class="calendar-table">
        <thead>
            <tr>
                <th>Mois</th>
            </tr>
        </thead>
        <tbody id="calendarBody">
            <!-- Les mois seront générés par JavaScript -->
        </tbody>
    </table>
</div>

<script>
    // ==================== //
    // LISTE DES MOIS
    // ==================== //
    
    const months = [
        "Janvier", "Février", "Mars", "Avril", "Mai", "Juin",
        "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"
    ];
    
    // Générer le tableau
    function generateCalendar() {
        const tbody = document.getElementById('calendarBody');
        tbody.innerHTML = '';
        
        months.forEach(month => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="month-cell">${month}</td>
            `;
            tbody.appendChild(row);
        });
    }
    
    // Initialiser la page
    document.addEventListener('DOMContentLoaded', generateCalendar);
</script>

</body>
</html>
