<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier - Récré Magic</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==================== */
        /* RESET & VARIABLES */
        /* ==================== */
        :root {
            --vert-caravane: #7CB69F;
            --rose-spectacle: #EC407A;
            --rouge-spectacle: #D32F2F;
            --jaune-accent: #FFB300;
            --creme-vintage: #FFF8E1;
            --text-dark: #2C1810;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--creme-vintage);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ==================== */
        /* SCROLLBAR PERSONNALISÉE */
        /* ==================== */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--rose-spectacle), var(--vert-caravane));
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--vert-caravane), var(--rose-spectacle));
        }

        /* ==================== */
        /* NAVBAR */
        /* ==================== */
        .navbar {
            background: rgba(44, 24, 16, 0.98);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo img {
            height: 50px;
            transition: transform 0.3s;
        }

        .navbar-logo img:hover {
            transform: scale(1.05);
        }

        /* ==================== */
        /* PAGE HEADER */
        /* ==================== */
        .page-hero {
            background: linear-gradient(135deg, var(--rouge-spectacle), #c2185b);
            color: white;
            padding: 6rem 2rem 3rem;
            text-align: center;
        }

        .page-hero h1 {
            font-family: 'Fredoka', cursive;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .page-hero p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        .back-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: all 0.3s;
            font-weight: 600;
        }

        .back-btn:hover {
            background: var(--jaune-accent);
            color: var(--text-dark);
            transform: translateX(-5px);
        }

        /* ==================== */
        /* TABLEAU SIMPLE - UNIQUEMENT LES MOIS */
        /* ==================== */
        .calendar-table-container {
            max-width: 500px;
            margin: 3rem auto;
            padding: 0 2rem 4rem;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .calendar-table th {
            background: linear-gradient(135deg, var(--vert-caravane), var(--rose-spectacle));
            color: white;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .calendar-table td {
            padding: 0.8rem 1rem;
            border: 1px solid #e0e0e0;
            text-align: center;
        }

        .month-cell {
            background: var(--creme-vintage);
            font-weight: 700;
            color: var(--rouge-spectacle);
        }

        /* ==================== */
        /* FOOTER */
        /* ==================== */
        .footer {
            background: var(--text-dark);
            color: var(--text-light);
            padding: 3rem 2rem;
            margin-top: auto;
        }

        .footer .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .footer-brand {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .footer-logo {
            height: 50px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .footer-brand p {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .footer-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--jaune-accent);
        }

        /* ==================== */
        /* RESPONSIVE */
        /* ==================== */
        @media (max-width: 768px) {
            .navbar-container {
                padding: 0.6rem 1.5rem;
            }
            
            .navbar-logo img {
                height: 45px;
            }
            
            .page-hero h1 {
                font-size: 2.5rem;
            }
            
            .page-hero {
                padding: 5rem 1rem 2rem;
            }
            
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            
            .calendar-table-container {
                padding: 0 1rem 2rem;
            }
            
            .calendar-table th,
            .calendar-table td {
                padding: 0.5rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .page-hero h1 {
                font-size: 1.8rem;
            }
            
            .page-hero p {
                font-size: 1rem;
            }
            
            .back-btn {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <img src="images/logo.png" alt="Récré Magic">
            </a>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-hero">
        <a href="familles.html" class="back-btn">← Retour</a>
        <h1>📅 Calendrier 2026</h1>
        <p>Planning des représentations</p>
    </div>

    <!-- TABLEAU SIMPLE : UNIQUEMENT LES MOIS -->
    <div class="calendar-table-container">
        <table class="calendar-table">
            <thead>
                <tr>
                    <th>Mois</th>
                </tr>
            </thead>
            <tbody id="calendarBody">
                <!-- Les mois seront générés par JavaScript -->
            </tbody>
         </table>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <img src="images/logo.png" alt="Récré Magic" class="footer-logo" onerror="this.style.display='none'">
                    <p>Récré Magic • Circus Théâtre Ambulant depuis 1964</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">Accueil</a>
                    <a href="spectacles.html">Spectacles</a>
                    <a href="pros.html">Espace Pro</a>
                    <a href="familles.html">Familles</a>
                    <a href="boutique.html">Boutique</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // ==================== //
        // LISTE DES MOIS
        // ==================== //
        
        const months = [
            "Janvier", "Février", "Mars", "Avril", "Mai", "Juin",
            "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"
        ];
        
        // Générer le tableau
        function generateCalendar() {
            const tbody = document.getElementById('calendarBody');
            tbody.innerHTML = '';
            
            months.forEach(month => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="month-cell">${month}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // Initialiser la page
        document.addEventListener('DOMContentLoaded', generateCalendar);
    </script>
</body>
</html>
