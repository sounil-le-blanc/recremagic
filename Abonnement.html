<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abonnement - Récré Magic</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vert-caravane: #7CB69F;
            --rose-spectacle: #EC407A;
            --jaune-accent: #FFB300;
            --text-dark: #2C1810;
            --text-light: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--rose-spectacle), var(--vert-caravane)); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, var(--vert-caravane), var(--rose-spectacle)); }

        body {
            font-family: 'Quicksand', sans-serif;
            background-image: url('images/fond-image.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding-top: 80px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
            pointer-events: none;
        }

        /* NAVBAR TRANSPARENTE */
        .navbar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: transparent;
            z-index: 1000;
        }
        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.8rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 1rem;
        }
        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .back-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
            text-decoration: none; cursor: pointer; transition: all 0.2s ease;
        }
        .back-wrapper span:first-child {
            font-size: 1.1rem; font-weight: 600; color: white;
            text-shadow: 1px 1px 3px black; transition: transform 0.2s, color 0.2s;
        }
        .back-wrapper .back-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            background: rgba(0,0,0,0.6); padding: 0.2rem 0.5rem; border-radius: 20px;
            opacity: 0; transition: opacity 0.2s ease; color: white; white-space: nowrap;
        }
        .back-wrapper:hover span:first-child { transform: scale(1.05); color: var(--jaune-accent); }
        .back-wrapper:hover .back-label { opacity: 1; color: var(--jaune-accent); }

        .logo-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
            text-decoration: none; transition: all 0.2s ease;
        }
        .logo-wrapper img {
            height: 50px; transition: transform 0.2s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
        }
        .logo-wrapper .logo-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            background: rgba(0,0,0,0.6); padding: 0.2rem 0.5rem; border-radius: 20px;
            opacity: 0; transition: opacity 0.2s ease; color: white; white-space: nowrap;
        }
        .logo-wrapper:hover img { transform: scale(1.05); }
        .logo-wrapper:hover .logo-label { opacity: 1; color: var(--jaune-accent); }

        .nav-icons { display: flex; gap: 2rem; align-items: center; }
        .icon-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
            text-decoration: none; transition: all 0.2s ease;
        }
        .icon-wrapper span {
            font-size: 1.3rem; color: white;
            text-shadow: 1px 1px 3px black; transition: transform 0.2s;
        }
        .icon-wrapper .icon-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            background: rgba(0,0,0,0.6); padding: 0.2rem 0.5rem; border-radius: 20px;
            opacity: 0; transition: opacity 0.2s ease; color: white; white-space: nowrap;
        }
        .icon-wrapper:hover span { transform: scale(1.1); color: var(--jaune-accent); }
        .icon-wrapper:hover .icon-label { opacity: 1; color: var(--jaune-accent); }

        /* CONTENU PRINCIPAL */
        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        .message-box {
            background: rgba(235, 215, 185, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 3rem 2rem;
            border: 5px solid #7a5c3e;
            outline: 4px solid #5a3e2a;
            outline-offset: 4px;
            box-shadow: 0 0 0 8px #3e2a1a, 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .soon-title {
            font-family: 'MedievalSharp', cursive;
            font-size: 3.5rem;
            font-weight: 800;
            color: #2C1810;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        .soon-subtitle {
            font-size: 1.3rem;
            color: #2C1810;
            margin-bottom: 2rem;
        }

        .btn-back {
            display: inline-block;
            background: linear-gradient(135deg, #D32F2F, #EC407A);
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            margin-top: 1rem;
        }
        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            body { padding-top: 70px; }
            .navbar-container { flex-direction: column; padding: 0.6rem 1.5rem; }
            .nav-left { gap: 1rem; }
            .nav-icons { gap: 1.5rem; }
            .logo-wrapper img { height: 45px; }
            .soon-title { font-size: 2.2rem; }
            .soon-subtitle { font-size: 1rem; }
            .message-box { padding: 2rem 1.5rem; margin: 0 1rem; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <div class="nav-left">
            <div class="back-wrapper" onclick="history.back()">
                <span>← Retour</span>
                <span class="back-label">Retour</span>
            </div>
            <a href="index.html" class="logo-wrapper">
                <img src="images/logo.png" alt="Récré Magic">
                <span class="logo-label">Accueil</span>
            </a>
        </div>
        <div class="nav-icons">
            <a href="calendrier.html" class="icon-wrapper"><span>📅</span><span class="icon-label">Calendrier</span></a>
            <a href="boutique.html" class="icon-wrapper"><span>💰</span><span class="icon-label">Boutique</span></a>
            <a href="Abonnement.html" class="icon-wrapper"><span>🤝</span><span class="icon-label">Abonnement</span></a>
        </div>
    </div>
</nav>

<div class="main-content">
    <div class="message-box">
        <h1 class="soon-title">Bientôt disponible</h1>
        <p class="soon-subtitle">Les formules d'abonnement arrivent très bientôt !</p>
        <a href="index.html" class="btn-back">← Retour à l'accueil</a>
    </div>
</div>

</body>
</html>
